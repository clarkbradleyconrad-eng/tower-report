<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Players — Tower Report</title>
<meta name="description" content="Texas Longhorns key player profiles. Stats, recruiting background, NFL projections, and performance breakdowns."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
<script src="nav.js" defer></script>
<script src="player-profile.js" defer></script>
<style>
:root{--orange:#BF5700;--black:#080808;--surface:#111;--surface2:#181818;--surface3:#202020;--border:rgba(255,255,255,0.07);--border-strong:rgba(255,255,255,0.12);--white:#F5F0E8;--muted:#6B6560;--secondary:#A09890;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--black);color:var(--white);}

.page-header{padding:40px 48px 28px;border-bottom:1px solid var(--border);max-width:1400px;margin:0 auto;}
.breadcrumb{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.breadcrumb span{color:var(--orange);}
.page-title{font-family:'Playfair Display',serif;font-size:clamp(32px,4vw,56px);font-weight:900;line-height:1;letter-spacing:-2px;margin-bottom:8px;}
.page-sub{font-size:14px;color:var(--secondary);font-style:italic;}

.content-wrap{max-width:1400px;margin:0 auto;padding:0 48px 80px;}

/* PLAYER INDEX */
.player-index{display:flex;gap:8px;flex-wrap:wrap;padding:20px 0 24px;border-bottom:1px solid var(--border);margin-bottom:32px;}
.pi-btn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s;text-decoration:none;}
.pi-btn:hover,.pi-btn.active{background:var(--orange);border-color:var(--orange);color:#fff;}

/* FEATURED PLAYER - HERO CARD */
.player-hero{display:grid;grid-template-columns:300px 1fr;gap:1px;background:var(--border);margin-bottom:1px;}
.ph-number{background:var(--surface);display:flex;align-items:center;justify-content:center;min-height:280px;position:relative;overflow:hidden;}
.ph-num-bg{position:absolute;font-family:'Playfair Display',serif;font-size:200px;font-weight:900;color:rgba(191,87,0,0.07);line-height:1;user-select:none;}
.ph-num-display{font-family:'Barlow Condensed',sans-serif;font-size:64px;font-weight:700;color:var(--orange);position:relative;z-index:1;}
.ph-pos-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);position:relative;z-index:1;margin-top:4px;}
.ph-info{background:var(--surface);padding:32px 36px;display:flex;flex-direction:column;justify-content:space-between;}
.ph-name{font-family:'Playfair Display',serif;font-size:clamp(28px,3.5vw,46px);font-weight:900;line-height:1;letter-spacing:-1.5px;color:var(--white);margin-bottom:6px;}
.ph-pos-yr{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:20px;}
.ph-vitals{display:flex;gap:28px;flex-wrap:wrap;margin-bottom:20px;}
.ph-vital{text-align:center;}
.ph-vital-val{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--white);}
.ph-vital-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.ph-bio{font-size:13px;line-height:1.7;color:var(--secondary);max-width:560px;}
.ph-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);margin-top:20px;}
.phs-cell{background:var(--surface2);padding:12px 14px;text-align:center;}
.phs-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--white);}
.phs-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.ph-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:16px;}
.ph-tag{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 8px;background:var(--surface3);border:1px solid var(--border);color:var(--muted);}
.ph-tag.hot{background:rgba(191,87,0,0.12);border-color:rgba(191,87,0,0.3);color:var(--orange);}

/* SECTION HEADER */
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:28px 0 16px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.sec-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--orange);}

/* PLAYER GRID */
.players-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin-bottom:40px;}
.player-card{background:var(--surface);padding:0;overflow:hidden;cursor:pointer;transition:background .15s;}
.player-card:hover{background:var(--surface2);}
.pc-top{padding:20px 20px 16px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border);cursor:pointer;}
.pc-num{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:700;color:var(--orange);min-width:44px;}
.pc-name{font-size:15px;font-weight:600;color:var(--white);margin-bottom:3px;}
.pc-pos-yr{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);}
.pc-body{padding:16px 20px;}
.pc-bio{font-size:12px;line-height:1.6;color:var(--muted);}
.pc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin-top:14px;}
.pcs-cell{background:var(--surface2);padding:10px 8px;text-align:center;}
.pcs-val{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--white);}
.pcs-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-top:1px;}
.pc-tags{display:flex;gap:4px;flex-wrap:wrap;padding:12px 20px;border-top:1px solid var(--border);}
.pc-tag{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;background:var(--surface3);border:1px solid var(--border);color:var(--muted);}
.pc-tag.orange{background:rgba(191,87,0,0.1);border-color:rgba(191,87,0,0.25);color:var(--orange);}

/* EXPAND PANEL */
.pc-expand{display:none;border-top:2px solid var(--orange);background:var(--surface2);padding:16px 20px 20px;}
.pc-expand.open{display:block;}
.pce-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:6px;margin-top:12px;}
.pce-label:first-child{margin-top:0;}
.pce-text{font-size:12px;line-height:1.65;color:var(--secondary);}
.pce-text strong{color:var(--white);}
.pce-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
.pce-link{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:6px 12px;border:1px solid var(--border-strong);color:var(--secondary);text-decoration:none;transition:all .15s;}
.pce-link:hover{color:var(--white);border-color:var(--white);}
.pce-link.primary{background:var(--orange);border-color:var(--orange);color:#fff;}
.pce-link.primary:hover{background:transparent;color:var(--orange);}
.pc-chevron{margin-left:auto;font-size:11px;color:var(--muted);transition:transform .2s;display:inline-block;}
.player-card.open .pc-chevron{transform:rotate(90deg);color:var(--orange);}

/* NFL TRACKER */
.nfl-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);margin-bottom:40px;}
.nfl-card{background:var(--surface);padding:20px 18px;}
.nfl-name{font-size:14px;font-weight:600;color:var(--white);margin-bottom:4px;}
.nfl-pos{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--orange);margin-bottom:10px;}
.nfl-grade-wrap{margin-bottom:8px;}
.nfl-grade-label{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}
.nfl-grade-bar{height:4px;background:var(--surface3);border-radius:2px;}
.nfl-grade-fill{height:100%;border-radius:2px;background:var(--orange);}
.nfl-draft{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--secondary);}

footer{padding:28px 48px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);}
.footer-logo{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:3px;color:var(--muted);}
.footer-logo span{color:var(--orange);}
.footer-text{font-size:12px;color:var(--muted);}

@media(max-width:900px){
  .page-header,.content-wrap{padding-left:20px;padding-right:20px;}
  .player-hero{grid-template-columns:1fr;}
  .ph-number{min-height:160px;}
  .players-grid,.nfl-grid{grid-template-columns:1fr;}
  footer{flex-direction:column;gap:8px;padding:20px;}
}
</style>
</head>
<body>

<div class="page-header">
  <div class="breadcrumb">Tower Report <span>/ Players</span></div>
  <h1 class="page-title">Players</h1>
  <p class="page-sub">Key Player Profiles · 2025 Stats · Recruiting Background · NFL Projections</p>
</div>

<div class="content-wrap">

  <div class="player-index" id="player-index">
    <a class="pi-btn" href="roster.html">Full Roster →</a>
    <span class="pi-btn active" style="background:var(--orange);border-color:var(--orange);color:#fff;cursor:default;">Key Players</span>
    <a class="pi-btn" href="#offense">Offense</a>
    <a class="pi-btn" href="#defense">Defense</a>
    <a class="pi-btn" href="#nfl">NFL Watch</a>
  </div>

  <div id="players-loading" style="padding:60px;text-align:center;color:#6B6560;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase;">Loading players...</div>
  <div id="players-main" style="display:none;"></div>

</div>

<footer>
  <div class="footer-logo">TOWER<span>REPORT</span></div>
  <div class="footer-text">The Tower Never Sleeps. © 2026</div>
</footer>
<script>
function posColor(pos){
  const m={QB:'#E8620A',RB:'#4ade80',WR:'#60a5fa',TE:'#a78bfa',OT:'#f472b6',OG:'#f472b6',C:'#f472b6',OL:'#f472b6',DE:'#fb923c',DT:'#fb923c',EDGE:'#fb923c',LB:'#facc15',CB:'#34d399',DB:'#34d399',S:'#34d399'};
  return m[pos]||'#BF5700';
}

function statCells(p){
  const s=p.stats;
  if(!s||!s.displayStats) return '';
  return s.displayStats.slice(0,3).map(d=>`<div class="pcs-cell"><div class="pcs-val">${d.season}</div><div class="pcs-label">${d.label}</div></div>`).join('');
}

function recruitTag(p){
  const r=p.recruiting||{};
  if(r.transferFrom) return `<span class="pc-tag orange">Portal — ${r.transferFrom}</span>`;
  if(r.stars) return `<span class="pc-tag">${'★'.repeat(r.stars)} · #${r.nationalRank||'—'} Overall</span>`;
  return '';
}

function heroHTML(p){
  const ds=p.stats&&p.stats.displayStats||[];
  const statsHTML=ds.map(d=>`<div class="phs-cell"><div class="phs-val">${d.season}</div><div class="phs-label">${d.label}</div></div>`).join('');
  const awards=(p.rankings&&p.rankings.awards)||[];
  const draft=p.draft||{};
  const allTags=[
    ...awards.map(a=>`<span class="ph-tag hot">${a}</span>`),
    draft.roundProjection?`<span class="ph-tag hot">${draft.roundProjection}</span>`:'',
    `<span class="ph-tag">2025 Stats</span>`
  ].join('');
  const nil=p.nil||{};
  return `
  <div class="player-hero" style="cursor:pointer" onclick="openPlayerProfile('${p.slug}')" title="Click for full profile">
    <div class="ph-number">
      <div class="ph-num-bg">${p.number}</div>
      <div style="text-align:center;position:relative;z-index:1;">
        <div class="ph-num-display">#${p.number}</div>
        <div class="ph-pos-label">${p.position}</div>
      </div>
    </div>
    <div class="ph-info">
      <div>
        <div class="ph-name">${p.name}</div>
        <div class="ph-pos-yr" style="color:${posColor(p.position)}">${p.position} · ${p.year} · ${p.hometown}</div>
        <div class="ph-vitals">
          <div class="ph-vital"><div class="ph-vital-val">${p.height||'—'}</div><div class="ph-vital-label">Height</div></div>
          <div class="ph-vital"><div class="ph-vital-val">${p.weight||'—'}</div><div class="ph-vital-label">Weight</div></div>
          ${p.recruiting&&p.recruiting.stars?`<div class="ph-vital"><div class="ph-vital-val" style="color:#BF5700">${'★'.repeat(p.recruiting.stars)}</div><div class="ph-vital-label">Stars</div></div>`:''}
          ${p.recruiting&&p.recruiting.nationalRank?`<div class="ph-vital"><div class="ph-vital-val">#${p.recruiting.nationalRank}</div><div class="ph-vital-label">Class of ${p.recruiting.classYear}</div></div>`:''}
          ${nil.value?`<div class="ph-vital"><div class="ph-vital-val" style="color:#4ade80">${nil.value}</div><div class="ph-vital-label">NIL Value</div></div>`:''}
        </div>
        <p class="ph-bio">${p.bio||''}</p>
      </div>
      <div>
        ${statsHTML?`<div class="ph-stats">${statsHTML}</div>`:''}
        <div class="ph-tags">${allTags}</div>
        <div style="margin-top:12px;">
          <button onclick="event.stopPropagation();openPlayerProfile('${p.slug}')" style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:8px 18px;background:#BF5700;border:none;color:#fff;cursor:pointer;">★ Full Deep Profile →</button>
        </div>
      </div>
    </div>
  </div>`;
}

function cardHTML(p){
  const s=p.stats||{};
  const ds=s.displayStats||[];
  const st=ds.slice(0,3);
  const draft=p.draft||{};
  const awards=(p.rankings&&p.rankings.awards)||[];
  const rec=p.recruiting||{};
  const extraLabel=(()=>{
    if(s.type==='passing') return `${ds[0]?ds[0].season:''} yds · ${ds[1]?ds[1].season:''} TD · ${ds[2]?ds[2].season:''} INT`;
    if(s.type==='rushing') return `${ds[0]?ds[0].season:''} yds · ${ds[2]?ds[2].season:''} avg · ${ds[1]?ds[1].season:''} TD`;
    if(s.type==='receiving') return `${ds[0]?ds[0].season:''} rec · ${ds[1]?ds[1].season:''} yds · ${ds[2]?ds[2].season:''} TD`;
    if(s.type==='defense') return `${ds[0]?ds[0].season:''} ${ds[0]?ds[0].label:''} · ${ds[1]?ds[1].season:''} ${ds[1]?ds[1].label:''}`;
    if(s.type==='oline') return `${ds[0]?ds[0].season:''} games · ${ds[2]?ds[2].season:''} sacks allowed`;
    return '';
  })();
  const scoutPts=(p.scout&&p.scout.strengths&&p.scout.strengths[0])||'';
  return `
  <div class="player-card" id="pc-${p.slug}" onclick="toggleCard('${p.slug}')">
    <div class="pc-top">
      <div class="pc-num" style="color:${posColor(p.position)}">${p.number}</div>
      <div style="flex:1;">
        <div class="pc-name">${p.name}</div>
        <div class="pc-pos-yr">${p.position} · ${p.year} · ${rec.transferFrom?rec.transferFrom+' Transfer':p.hometown}</div>
      </div>
      <span class="pc-chevron">▸</span>
    </div>
    <div class="pc-body">
      <div class="pc-bio">${p.bio?p.bio.slice(0,160)+'...':''}</div>
      <div class="pc-stats">
        ${st.map(d=>`<div class="pcs-cell"><div class="pcs-val">${d.season}</div><div class="pcs-label">${d.label}</div></div>`).join('')}
      </div>
    </div>
    <div class="pc-tags">
      ${recruitTag(p)}
      ${draft.roundProjection?`<span class="pc-tag orange">${draft.roundProjection}</span>`:''}
      ${awards[0]?`<span class="pc-tag">${awards[0]}</span>`:''}
    </div>
    <div class="pc-expand" id="expand-${p.slug}">
      <div class="pce-label">2025 Season</div>
      <div class="pce-text"><strong>${extraLabel}</strong></div>
      ${scoutPts?`<div class="pce-label">Top Scout Strength</div><div class="pce-text">${scoutPts}</div>`:''}
      ${draft.notes?`<div class="pce-label">NFL Outlook</div><div class="pce-text">${draft.notes}</div>`:''}
      <div class="pce-links">
        <button class="pce-link primary" onclick="event.stopPropagation();openPlayerProfile('${p.slug}')">★ Full Profile →</button>
        <a href="schedule.html" class="pce-link">Stats →</a>
        ${p.links&&p.links.utBio?`<a href="${p.links.utBio}" class="pce-link" target="_blank" rel="noopener">UT Bio →</a>`:''}
        ${p.links&&p.links.youtube?`<a href="${p.links.youtube}" class="pce-link" target="_blank" rel="noopener">▶ Highlights</a>`:''}
      </div>
    </div>
  </div>`;
}

function nflCardHTML(p){
  const d=p.draft||{};
  const grade=Math.min(100,Math.max(0,d.grade||0));
  return `
  <div class="nfl-card" style="cursor:pointer" onclick="openPlayerProfile('${p.slug}')">
    <div class="nfl-name">${p.name}</div>
    <div class="nfl-pos" style="color:${posColor(p.position)}">${p.position}</div>
    <div class="nfl-grade-wrap">
      <div class="nfl-grade-label">Draft Grade · ${grade}</div>
      <div class="nfl-grade-bar"><div class="nfl-grade-fill" style="width:${grade}%"></div></div>
    </div>
    <div class="nfl-draft">${d.roundProjection||'—'}</div>
    ${d.eligible?`<div style="font-family:'Barlow Condensed',sans-serif;font-size:9px;color:#6B6560;margin-top:4px;letter-spacing:1px;text-transform:uppercase;">${d.eligible} Draft Eligible</div>`:''}
  </div>`;
}

let _openCards=[];
function toggleCard(slug){
  _openCards.forEach(s=>{
    document.getElementById('pc-'+s)?.classList.remove('open');
    document.getElementById('expand-'+s)?.classList.remove('open');
  });
  const card=document.getElementById('pc-'+slug);
  const panel=document.getElementById('expand-'+slug);
  if(!card||!panel) return;
  const wasOpen=_openCards.includes(slug);
  _openCards=[];
  if(!wasOpen){
    card.classList.add('open');
    panel.classList.add('open');
    _openCards=[slug];
  }
}

const OFFENSE_POS=['QB','RB','WR','TE','OT','OG','C','OL'];
const DEFENSE_POS=['DE','DT','EDGE','LB','CB','DB','S'];

function buildPage(players){
  if(!players||!players.length){
    document.getElementById('players-loading').style.display='none';
    document.getElementById('players-main').style.display='block';
    document.getElementById('players-main').innerHTML=`<div style="padding:60px 48px;text-align:center;"><p style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#6B6560;margin-bottom:10px;">Player Data Unavailable</p><p style="font-size:14px;color:#6B6560;font-style:italic;">Unable to load players — check console for details.</p></div>`;
    return;
  }
  const hero=players.find(p=>p.position==='QB')||players[0];
  const offense=players.filter(p=>p.slug!==hero.slug&&OFFENSE_POS.includes(p.position));
  const defense=players.filter(p=>DEFENSE_POS.includes(p.position));
  const nflWatch=players.filter(p=>p.draft&&p.draft.grade>=68).sort((a,b)=>b.draft.grade-a.draft.grade);

  // Populate player-index quick links
  const idx=document.getElementById('player-index');
  if(idx){
    const existing=Array.from(idx.querySelectorAll('.pi-btn'));
    const lastFixed=existing.slice(0,5);
    const extras=players.map(p=>`<button class="pi-btn" onclick="openPlayerProfile('${p.slug}')">${p.name.split(' ').pop()}</button>`).join('');
    idx.insertAdjacentHTML('beforeend',extras);
  }

  document.getElementById('players-main').innerHTML=`
    ${heroHTML(hero)}
    <div class="sec-head" id="offense" style="margin-top:32px;">
      <div class="sec-title">Offensive Players to Watch</div>
      <a href="schedule.html" style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#BF5700;text-decoration:none;">Full Stat Leaders →</a>
    </div>
    <div class="players-grid">${offense.map(cardHTML).join('')}</div>
    <div class="sec-head" id="defense">
      <div class="sec-title">Defensive Players to Watch</div>
      <a href="schedule.html" style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#BF5700;text-decoration:none;">Defense Leaders →</a>
    </div>
    <div class="players-grid">${defense.map(cardHTML).join('')}</div>
    <div class="sec-head" id="nfl">
      <div class="sec-title">NFL Draft Watch · ${nflWatch[0]&&nflWatch[0].draft&&nflWatch[0].draft.eligible?nflWatch[0].draft.eligible:2027} Draft</div>
    </div>
    <div class="nfl-grid">${nflWatch.map(nflCardHTML).join('')}</div>
  `;
}

function initPlayers(){
  if(window.loadPlayers){
    window.loadPlayers().then(function(players){
      document.getElementById('players-loading').style.display='none';
      document.getElementById('players-main').style.display='block';
      buildPage(players);
    });
  } else {
    fetch('./data/players.json').then(r=>r.json()).then(data=>{
      document.getElementById('players-loading').style.display='none';
      document.getElementById('players-main').style.display='block';
      buildPage(data.players);
    });
  }
}

if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded',initPlayers);
} else {
  initPlayers();
}
</script>
</body>
</html>
