<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 48" role="img" aria-label="Tower Report">
  <defs>
    <linearGradient id="tg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F07525"/>
      <stop offset="55%" stop-color="#BF5700"/>
      <stop offset="100%" stop-color="#7A3400"/>
    </linearGradient>
  </defs>
  <!-- Base tier -->
  <rect x="1" y="36" width="38" height="11" rx="2" fill="url(#tg)"/>
  <!-- Mid tier -->
  <rect x="6" y="23" width="28" height="14" rx="1.5" fill="url(#tg)"/>
  <!-- Top body -->
  <rect x="12" y="12" width="16" height="13" rx="1" fill="url(#tg)"/>
  <!-- Clock circle -->
  <circle cx="20" cy="19" r="4.5" fill="#080808" stroke="#BF5700" stroke-width="0.9"/>
  <line x1="20" y1="19" x2="20" y2="15.5" stroke="#E8620A" stroke-width="0.9" stroke-linecap="round"/>
  <line x1="20" y1="19" x2="23" y2="20.5" stroke="#E8620A" stroke-width="0.9" stroke-linecap="round"/>
  <!-- Antenna -->
  <rect x="18.5" y="4" width="3" height="10" rx="1" fill="#E8620A"/>
  <circle cx="20" cy="3" r="2.2" fill="#F07525"/>
  <!-- Broadcast arcs -->
  <path d="M13,10 Q20,2 27,10" stroke="#E8620A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M7,15 Q20,-2 33,15" stroke="#BF5700" stroke-width="1.3" fill="none" stroke-linecap="round" opacity="0.55"/>
  <path d="M1,20 Q20,-6 39,20" stroke="#BF5700" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.25"/>
</svg>
