name: Update Roster Data

on:
  schedule:
    - cron: '0 6 * * *'  # Run daily at 6 AM UTC
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-roster:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml anthropic youtube-transcript-api

      - name: Fetch roster data
        run: |
          python .github/scripts/update_roster.py

      - name: Generate AI morning briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python .github/scripts/aggregate_news.py

      - name: Generate stories + process URL queue
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python .github/scripts/generate_stories.py

      - name: Commit and push if changed
        run: |
          git config user.name "Tower Report Bot"
          git config user.email "bot@tower-report.local"
          git add data/roster.json data/briefing.json data/stories.json data/story-queue.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update roster, briefing, and stories"
            git push
          fi
