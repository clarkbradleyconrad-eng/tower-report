<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title id="page-title">Game Story — Tower Report</title>
<meta id="page-desc" name="description" content="Texas Longhorns game story — Tower Report"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet"/>
<script src="nav.js" defer></script>
<script src="js/game-data.js"></script>
<style>
:root{--orange:#BF5700;--black:#080808;--white:#F5F0E8;--surface:#111;--surface2:#181818;--border:rgba(255,255,255,0.07);--muted:#6B6560;--secondary:#A09890;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--black);color:var(--white);}

/* ── HERO ── */
.gs-hero{position:relative;height:480px;background:#030303;overflow:hidden;display:flex;flex-direction:column;}
.gs-hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.013) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.013) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;}
.gs-glow-tx{position:absolute;left:0;top:0;bottom:0;width:55%;background:radial-gradient(ellipse 80% 95% at 15% 50%,rgba(191,87,0,0.32) 0%,transparent 68%);pointer-events:none;}
.gs-glow-opp{position:absolute;right:0;top:0;bottom:0;width:55%;pointer-events:none;}
.gs-hero-fade{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(3,3,3,0.08) 0%,transparent 28%,transparent 58%,rgba(3,3,3,0.9) 90%,#030303 100%);pointer-events:none;}
.gs-edge{position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,transparent 5%,#BF5700 22%,#BF5700 78%,transparent 95%);}

/* breadcrumb */
.gs-bc{position:absolute;top:20px;left:52px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(160,152,144,0.55);z-index:20;}
.gs-bc a{color:inherit;text-decoration:none;transition:color .15s;}
.gs-bc a:hover{color:var(--white);}
.gs-bc .sep{margin:0 6px;opacity:.4;}
.gs-bc .cur{color:rgba(191,87,0,0.85);}

/* matchup */
.gs-matchup{position:relative;z-index:10;display:flex;align-items:center;justify-content:center;padding:52px 52px 0;gap:0;flex:1;}
.gs-team{display:flex;flex-direction:column;align-items:center;gap:14px;flex:1;max-width:220px;}
.gs-logo{width:140px;height:140px;object-fit:contain;}
.gs-logo.tx{filter:drop-shadow(0 4px 40px rgba(191,87,0,0.5)) drop-shadow(0 8px 24px rgba(0,0,0,0.8));}
.gs-logo.opp{filter:drop-shadow(0 0 2px rgba(255,255,255,0.3)) drop-shadow(0 4px 28px rgba(0,0,0,0.7)) brightness(1.35) contrast(1.05);}
.gs-logo-ph{width:140px;height:140px;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.08);}
.gs-team-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:rgba(245,240,232,0.45);}

/* score */
.gs-score-col{display:flex;flex-direction:column;align-items:center;gap:10px;min-width:220px;text-align:center;}
.gs-score-nums{font-family:'Playfair Display',serif;font-size:90px;font-weight:900;line-height:1;letter-spacing:-5px;color:var(--white);display:flex;align-items:center;gap:6px;}
.gs-score-nums .win{color:#22c55e;}
.gs-score-nums .sep{font-size:54px;color:rgba(255,255,255,0.18);letter-spacing:0;}
.gs-pill{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:4px 14px;}
.gs-pill.w{background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.25);}
.gs-pill.l{background:rgba(239,68,68,0.12);color:#ef4444;border:1px solid rgba(239,68,68,0.22);}

/* hero bottom */
.gs-hero-bot{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:16px 52px 20px;}
.gs-game-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:900;color:var(--white);letter-spacing:-0.5px;line-height:1.1;margin-bottom:6px;}
.gs-game-meta{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.gs-game-meta .dot{width:3px;height:3px;border-radius:50%;background:var(--muted);flex-shrink:0;}

/* ── LAYOUT ── */
.gs-outer{max-width:1160px;margin:0 auto;padding:40px 52px 60px;display:grid;grid-template-columns:1fr 292px;gap:56px;}

/* ── STORY ── */
.gs-ai-badge{display:inline-flex;align-items:center;gap:8px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--orange);border:1px solid rgba(191,87,0,0.22);padding:5px 12px;margin-bottom:22px;}
.gs-ai-dot{width:6px;height:6px;border-radius:50%;background:var(--orange);animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.75);}}
.gs-ai-dot.done{animation:none;}

.gs-story-text{font-size:16.5px;line-height:1.86;color:#BEB9B2;}
.gs-story-text p{margin-bottom:22px;}
.gs-story-text strong,.gs-story-text b{color:var(--white);}
.gs-story-text h2{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--white);margin:28px 0 12px;letter-spacing:-.3px;}
.gs-story-text h3{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--orange);margin:26px 0 10px;padding-top:22px;border-top:1px solid var(--border);}
.gs-story-text ul{list-style:none;padding:0;margin-bottom:20px;}
.gs-story-text li{padding:10px 0 10px 22px;border-bottom:1px solid var(--border);font-size:14px;color:var(--white);position:relative;line-height:1.5;}
.gs-story-text li::before{content:'→';position:absolute;left:0;color:var(--orange);font-family:'Barlow Condensed',sans-serif;font-weight:700;}

/* loading shimmer */
.gs-shimmer{padding:4px 0;display:flex;flex-direction:column;gap:12px;}
.gs-shim{height:15px;border-radius:2px;background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);background-size:200% 100%;animation:shim 1.6s infinite;}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* streaming cursor */
.gs-cursor{display:inline-block;width:2px;height:1em;background:var(--orange);vertical-align:text-bottom;margin-left:1px;animation:blink .7s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* AI searching state */
.gs-ai-searching{display:flex;align-items:center;gap:12px;padding:0 0 18px;margin-bottom:20px;border-bottom:1px solid var(--border);}
.gs-search-dot{width:7px;height:7px;border-radius:50%;background:var(--orange);animation:pulse 1.2s ease-in-out infinite;flex-shrink:0;}
.gs-search-txt{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.gs-search-sub{font-family:'Barlow',sans-serif;font-size:12px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;margin-top:2px;opacity:.7;}

/* youtube */
.gs-yt{background:var(--surface);border:1px solid var(--border);padding:20px 24px;margin-top:28px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;}
.gs-yt-left{display:flex;align-items:center;gap:14px;}
.gs-yt-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--white);margin-bottom:3px;}
.gs-yt-sub{font-size:12px;color:var(--muted);}
.gs-yt-btn{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:var(--orange);color:#fff;text-decoration:none;padding:10px 20px;border:1px solid var(--orange);transition:all .2s;flex-shrink:0;white-space:nowrap;}
.gs-yt-btn:hover{background:transparent;color:var(--orange);}

/* tags */
.gs-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:26px;padding-top:18px;border-top:1px solid var(--border);}
.gs-tag{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:3px 9px;border:1px solid var(--border);color:var(--muted);}

/* ── SIDEBAR ── */
.gs-sidebar{position:sticky;top:82px;display:flex;flex-direction:column;gap:14px;}
.gs-box{background:var(--surface);border:1px solid var(--border);}
.gs-box-hd{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface2);}
.gs-box-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}
.gs-sb-score-block{padding:18px 14px;text-align:center;border-bottom:1px solid var(--border);}
.gs-sb-logos{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:12px;}
.gs-sb-logo{width:44px;height:44px;object-fit:contain;}
.gs-sb-vs{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--muted);}
.gs-sb-num{font-family:'Playfair Display',serif;font-size:36px;font-weight:900;line-height:1;}
.gs-sb-num .win{color:#22c55e;}
.gs-sb-sep{color:rgba(255,255,255,0.2);font-size:24px;margin:0 4px;}
.gs-sb-result{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:6px;}
.gs-sb-result.w{color:#22c55e;}.gs-sb-result.l{color:#ef4444;}
.gs-srow{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);}
.gs-srow:last-child{border-bottom:none;}
.gs-srow-lbl{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.gs-srow-val{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--orange);}
.gs-srow-val.sm{font-size:12px;color:var(--white);font-family:'Barlow',sans-serif;font-weight:500;text-align:right;max-width:160px;}

/* ── RELATED ── */
.gs-related{max-width:1160px;margin:0 auto;padding:0 52px 72px;}
.gs-rel-hd{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--orange);padding-bottom:12px;border-bottom:1px solid var(--border);}
.gs-rel-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-top:none;}
.gs-rel-card{background:var(--surface);padding:20px 18px;text-decoration:none;display:block;border-left:2px solid transparent;transition:background .15s,border-color .15s;}
.gs-rel-card:hover{background:var(--surface2);border-left-color:var(--orange);}
.gs-rel-kicker{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--orange);margin-bottom:6px;}
.gs-rel-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;line-height:1.2;color:var(--white);margin-bottom:6px;}
.gs-rel-score{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--secondary);}
.gs-rel-score .ws{color:#22c55e;}

/* footer */
footer{padding:28px 52px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);}
.footer-logo{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;letter-spacing:3px;color:var(--muted);}
.footer-logo span{color:var(--orange);}
.footer-text{font-size:12px;color:var(--muted);}

/* error */
.gs-err{padding:80px 52px;text-align:center;}
.gs-err-num{font-family:'Playfair Display',serif;font-size:80px;font-weight:900;color:var(--surface2);line-height:1;margin-bottom:14px;}
.gs-err a{color:var(--orange);text-decoration:none;}

/* ── RESPONSIVE ── */
@media(max-width:960px){
  .gs-hero{height:360px;}
  .gs-logo,.gs-logo-ph{width:96px;height:96px;}
  .gs-score-nums{font-size:64px;}
  .gs-score-nums .sep{font-size:40px;}
  .gs-score-col{min-width:160px;}
  .gs-bc,.gs-hero-bot{left:0;padding-left:24px;padding-right:24px;}
  .gs-matchup{padding:44px 24px 0;}
  .gs-game-title{font-size:22px;}
  .gs-outer{grid-template-columns:1fr;padding:28px 24px 48px;gap:32px;}
  .gs-sidebar{position:static;}
  .gs-related{padding:0 24px 48px;}
  .gs-rel-grid{grid-template-columns:1fr;}
  footer{padding:20px 24px;flex-direction:column;gap:8px;text-align:center;}
}
@media(max-width:500px){
  .gs-logo,.gs-logo-ph{width:68px;height:68px;}
  .gs-score-nums{font-size:48px;letter-spacing:-2px;}
  .gs-score-nums .sep{font-size:30px;}
  .gs-hero{height:300px;}
  .gs-matchup{padding:36px 16px 0;}
  .gs-team-lbl{font-size:9px;letter-spacing:2px;}
}
</style>
</head>
<body>

<div id="gs-hero" class="gs-hero"></div>
<div id="gs-outer"></div>
<div id="gs-related"></div>
<footer><div class="footer-logo">TOWER<span>REPORT</span></div><div class="footer-text">The Tower Never Sleeps · © 2026</div></footer>

<script>
/* ── TEAM LOOKUP ── */
var TEAMS = {
  'OSU': {id:194, color:'rgba(187,0,0,0.3)',     name:'Ohio State'},
  'ALA': {id:333, color:'rgba(158,27,50,0.3)',   name:'Alabama'},
  'OU':  {id:201, color:'rgba(132,22,23,0.3)',   name:'Oklahoma'},
  'NEB': {id:158, color:'rgba(228,28,56,0.3)',   name:'Nebraska'},
  'MICH':{id:130, color:'rgba(0,39,76,0.3)',     name:'Michigan'},
  'CLEM':{id:228, color:'rgba(245,102,0,0.25)',  name:'Clemson'},
  'USC': {id:30,  color:'rgba(153,0,0,0.3)',     name:'USC'},
  'ARK': {id:8,   color:'rgba(157,34,53,0.3)',   name:'Arkansas'},
  'ND':  {id:87,  color:'rgba(12,35,64,0.3)',    name:'Notre Dame'},
  'LSU': {id:99,  color:'rgba(70,29,124,0.3)',   name:'LSU'},
  'A&M': {id:245, color:'rgba(80,0,0,0.3)',      name:'Texas A&M'},
  'UF':  {id:57,  color:'rgba(0,33,165,0.26)',   name:'Florida'},
  'UK':  {id:96,  color:'rgba(0,51,160,0.26)',   name:'Kentucky'},
  'MSU': {id:344, color:'rgba(93,0,28,0.3)',     name:'Mississippi State'},
  'MISS':{id:145, color:'rgba(206,13,45,0.26)',  name:'Ole Miss'},
  'VU':  {id:238, color:'rgba(0,40,85,0.28)',    name:'Vanderbilt'},
  'UGA': {id:61,  color:'rgba(186,12,47,0.3)',   name:'Georgia'},
  'AUB': {id:2,   color:'rgba(0,48,87,0.26)',    name:'Auburn'},
  'TENN':{id:2633,color:'rgba(255,130,0,0.22)',  name:'Tennessee'},
  'MIZ': {id:142, color:'rgba(241,184,45,0.18)', name:'Missouri'},
  'TCU': {id:2628,color:'rgba(77,25,121,0.28)',  name:'TCU'},
  'KSU': {id:2306,color:'rgba(81,40,136,0.26)',  name:'Kansas State'},
  'WVU': {id:277, color:'rgba(234,170,0,0.2)',   name:'West Virginia'},
  'ISU': {id:66,  color:'rgba(200,16,46,0.26)',  name:'Iowa State'},
  'BU':  {id:239, color:'rgba(21,71,52,0.28)',   name:'Baylor'},
  'SJS': {id:23,  color:'rgba(0,119,68,0.26)',   name:'San Jose State'},
  'UTEP':{id:2638,color:'rgba(0,61,124,0.26)',   name:'UTEP'},
  'SHU': {id:null,color:'rgba(36,88,140,0.24)',  name:'Sam Houston'},
  'UNT': {id:249, color:'rgba(0,100,56,0.26)',   name:'North Texas'},
  'RICE':{id:242, color:'rgba(0,32,91,0.28)',    name:'Rice'},
};

var TX_LOGO = 'https://a.espncdn.com/i/teamlogos/ncaa/500/251.png';

function espnLogo(id){ return 'https://a.espncdn.com/i/teamlogos/ncaa/500/'+id+'.png'; }
function teamInfo(abbr){ return TEAMS[abbr] || {id:null,color:'rgba(120,120,120,0.2)',name:abbr}; }
function cleanOpp(s){ return s.replace(/^at\s+/i,'').replace(/#\d+\s*/g,'').replace(/\s+/g,' ').trim(); }

/* ── BOOT ── */
document.addEventListener('DOMContentLoaded', function(){
  var p = new URLSearchParams(window.location.search);
  var vaultId = p.get('id');
  var season  = p.get('season');

  if (vaultId) {
    var game = typeof HISTORIC_GAMES!=='undefined'
      ? HISTORIC_GAMES.find(function(g){return g.id===vaultId;})
      : null;
    if (!game){ renderError(); return; }
    renderVault(game);
  } else if (season) {
    renderSeason({
      season: season,
      opp:    p.get('opp')    || 'Opponent',
      abbr:   (p.get('abbr') || '').toUpperCase(),
      date:   p.get('date')   || '',
      venue:  p.get('venue')  || '',
      week:   p.get('week')   || '',
      result: p.get('result') || 'W',
      ts:     p.get('ts')     || '0',
      os:     p.get('os')     || '0',
    });
  } else {
    renderError();
  }
});

/* ── VAULT GAME ── */
function renderVault(g) {
  var td = teamInfo(g.oppAbbr);
  var logo = g.oppLogo || (td.id ? espnLogo(td.id) : null);
  var isWin = g.result === 'W';

  document.getElementById('page-title').textContent = g.title+' | '+g.season+' Texas Longhorns | Tower Report';

  buildHero({
    title:g.title, kicker:g.season+' · '+g.context,
    date:g.date, venue:g.venue,
    oppName:g.oppName, oppAbbr:g.oppAbbr,
    oppLogo:logo, oppColor:td.color,
    ts:g.texas, os:g.opp, result:g.result,
  });

  var ytQ = encodeURIComponent(g.youtubeSearch);
  var ytBlock = ytHTML('https://www.youtube.com/results?search_query='+ytQ);
  var tags = '<div class="gs-tags"><span class="gs-tag">Texas Longhorns</span><span class="gs-tag">'+g.season+' Season</span><span class="gs-tag">'+g.context+'</span><span class="gs-tag">Vault</span></div>';

  buildOuter({
    storyHTML: g.story + ytBlock + tags,
    streaming: false,
    isWin:isWin, ts:g.texas, os:g.opp,
    oppLogo:logo, oppAbbr:g.oppAbbr, oppName:g.oppName,
    date:g.date, venue:g.venue, season:g.season,
    stats:g.stats,
  });

  buildRelated(g.id);
}

/* ── SEASON GAME ── */
function renderSeason(d) {
  var oppClean = cleanOpp(d.opp);
  var td = teamInfo(d.abbr);
  var logo = td.id ? espnLogo(td.id) : null;
  var isWin = d.result === 'W';

  document.getElementById('page-title').textContent = d.season+' Texas vs '+oppClean+' | Tower Report';

  buildHero({
    title:(isWin?'Texas def. ':'Texas vs ')+oppClean,
    kicker:d.season+' · '+(d.week||'Game')+(d.date?' · '+d.date:''),
    date:d.date+(d.season?', '+d.season:''),
    venue:d.venue,
    oppName:oppClean, oppAbbr:d.abbr,
    oppLogo:logo, oppColor:td.color,
    ts:d.ts, os:d.os, result:d.result,
  });

  buildOuter({
    storyHTML:null, streaming:true,
    isWin:isWin, ts:d.ts, os:d.os,
    oppLogo:logo, oppAbbr:d.abbr, oppName:oppClean,
    date:d.date, venue:d.venue, season:d.season,
    stats:null,
  });

  buildRelated(null);
  streamStory(d.season, oppClean, d.ts, d.os, d.result, d.date, d.venue, d.week);
}

/* ── BUILD HERO ── */
function buildHero(h) {
  var isWin = h.result==='W';
  var txN = isWin ? '<span class="win">'+h.ts+'</span>' : '<span>'+h.ts+'</span>';
  var osN = !isWin ? '<span class="win">'+h.os+'</span>' : '<span>'+h.os+'</span>';
  var oppImg = h.oppLogo
    ? '<img class="gs-logo opp" src="'+h.oppLogo+'" alt="'+h.oppAbbr+'" onerror="this.style.opacity=\'0.2\'"/>'
    : '<div class="gs-logo-ph">'+h.oppAbbr+'</div>';

  document.getElementById('gs-hero').innerHTML = [
    '<div class="gs-hero-grid"></div>',
    '<div class="gs-glow-tx"></div>',
    '<div class="gs-glow-opp" id="gs-glow-opp"></div>',
    '<div class="gs-hero-fade"></div>',
    '<div class="gs-edge"></div>',
    '<div class="gs-bc"><a href="index.html">Tower Report</a><span class="sep">/</span><a href="history.html">History</a><span class="sep">/</span><a href="history.html#vault">Vault</a><span class="sep">/</span><span class="cur">'+h.oppAbbr+'</span></div>',
    '<div class="gs-matchup">',
      '<div class="gs-team"><img class="gs-logo tx" src="'+TX_LOGO+'" alt="Texas"/><span class="gs-team-lbl">Longhorns</span></div>',
      '<div class="gs-score-col">',
        '<div class="gs-score-nums">'+txN+'<span class="sep">–</span>'+osN+'</div>',
        '<span class="gs-pill '+(isWin?'w':'l')+'">'+(isWin?'Texas Win':'Texas Loss')+'</span>',
      '</div>',
      '<div class="gs-team">'+oppImg+'<span class="gs-team-lbl">'+h.oppAbbr+'</span></div>',
    '</div>',
    '<div class="gs-hero-bot">',
      '<div class="gs-game-title">'+h.title+'</div>',
      '<div class="gs-game-meta"><span>'+h.kicker+'</span>'+(h.venue?'<span class="dot"></span><span>'+h.venue+'</span>':'')+'</div>',
    '</div>',
  ].join('');

  document.getElementById('gs-glow-opp').style.background =
    'radial-gradient(ellipse 78% 95% at 85% 50%,'+h.oppColor+' 0%,transparent 68%)';
}

/* ── BUILD OUTER ── */
function buildOuter(b) {
  var isWin = b.isWin;
  var txN = isWin ? '<span class="win">'+b.ts+'</span>' : b.ts;
  var osN = !isWin ? '<span class="win">'+b.os+'</span>' : b.os;
  var oppLogoSml = b.oppLogo ? '<img class="gs-sb-logo" src="'+b.oppLogo+'" alt="" onerror="this.style.display=\'none\'"/>' : '';
  var statsBlock = '';
  if (b.stats) {
    statsBlock = '<div class="gs-box" style="margin-top:0;"><div class="gs-box-hd"><div class="gs-box-lbl">Key Stats</div></div>'
      + b.stats.map(function(s){ return '<div class="gs-srow"><span class="gs-srow-lbl">'+s.l+'</span><span class="gs-srow-val">'+s.v+'</span></div>'; }).join('')
      + '</div>';
  }

  var storySection = b.streaming
    ? '<div class="gs-ai-badge"><span class="gs-ai-dot" id="gs-dot"></span>Tower Report · Grok AI Live</div><div class="gs-story-text" id="gs-story"><div class="gs-shimmer">'+shims()+'</div></div>'
    : '<div class="gs-ai-badge"><span class="gs-ai-dot done"></span>Tower Report · Game Story</div><div class="gs-story-text" id="gs-story">'+b.storyHTML+'</div>';

  document.getElementById('gs-outer').innerHTML =
    '<div class="gs-outer">'
    + '<div>'+storySection+'</div>'
    + '<div class="gs-sidebar">'
    + '<div class="gs-box"><div class="gs-sb-score-block"><div class="gs-sb-logos"><img class="gs-sb-logo" src="'+TX_LOGO+'" alt="Texas"/><span class="gs-sb-vs">VS</span>'+oppLogoSml+'</div><div class="gs-sb-num">'+txN+'<span class="gs-sb-sep">–</span>'+osN+'</div><div class="gs-sb-result '+(isWin?'w':'l')+'">'+(isWin?'✓ Texas Win':'✗ Texas Loss')+'</div></div>'
    + '<div class="gs-srow"><span class="gs-srow-lbl">Date</span><span class="gs-srow-val sm">'+(b.date||'—')+'</span></div>'
    + '<div class="gs-srow"><span class="gs-srow-lbl">Venue</span><span class="gs-srow-val sm">'+(b.venue||'—')+'</span></div>'
    + '<div class="gs-srow"><span class="gs-srow-lbl">Season</span><span class="gs-srow-val sm">'+(b.season||'—')+'</span></div>'
    + '<div class="gs-srow"><span class="gs-srow-lbl">Opponent</span><span class="gs-srow-val sm">'+(b.oppName||b.oppAbbr||'—')+'</span></div>'
    + '</div>'
    + statsBlock
    + '<div class="gs-box"><div class="gs-box-hd"><div class="gs-box-lbl">Navigate</div></div><div style="padding:12px 14px;display:flex;flex-direction:column;gap:10px;"><a href="history.html#vault" style="font-family:\'Barlow Condensed\',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--orange);text-decoration:none;">← Game Vault</a><a href="history.html" style="font-family:\'Barlow Condensed\',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;">Full History →</a></div></div>'
    + '</div>'
    + '</div>';
}

/* ── BUILD RELATED ── */
function buildRelated(excludeId) {
  if (typeof HISTORIC_GAMES==='undefined') return;
  var pool = HISTORIC_GAMES.filter(function(g){return g.id!==excludeId;});
  var picks=[], arr=pool.slice();
  for(var i=0;i<3&&arr.length;i++){var x=Math.floor(Math.random()*arr.length);picks.push(arr.splice(x,1)[0]);}
  if(!picks.length) return;
  var cards = picks.map(function(g){
    var sc = g.result==='W'
      ? 'Texas <span class="ws">'+g.texas+'</span> – '+g.oppAbbr+' '+g.opp
      : 'Texas '+g.texas+' – '+g.oppAbbr+' '+g.opp;
    return '<a href="game-story.html?id='+g.id+'" class="gs-rel-card"><div class="gs-rel-kicker">'+g.season+' · '+g.context+'</div><div class="gs-rel-title">'+g.title+'</div><div class="gs-rel-score">'+sc+'</div></a>';
  }).join('');
  document.getElementById('gs-related').innerHTML =
    '<div class="gs-related"><div class="gs-rel-hd">More from the Vault</div><div class="gs-rel-grid">'+cards+'</div></div>';
}

/* ── ERROR ── */
function renderError(){
  document.getElementById('gs-hero').style.display='none';
  document.getElementById('gs-outer').innerHTML='<div class="gs-err"><div class="gs-err-num">404</div><p style="color:var(--muted);margin-bottom:14px;">Game not found in the vault.</p><a href="history.html">← Back to History</a></div>';
}

/* ── YT BLOCK ── */
function ytHTML(url){
  return '<div class="gs-yt"><div class="gs-yt-left"><svg viewBox="0 0 32 22" width="32" height="22"><rect width="32" height="22" rx="5" fill="#FF0000"/><path d="M13 7l10 4-10 4V7z" fill="#fff"/></svg><div><div class="gs-yt-lbl">Watch the Highlights</div><div class="gs-yt-sub">Search YouTube for footage from this game</div></div></div><a class="gs-yt-btn" href="'+url+'" target="_blank" rel="noopener">▶ Search YouTube</a></div>';
}

/* ── SHIMMER ── */
function shims(){
  var ws=['85%','65%','92%','78%','55%','88%','70%','60%'];
  return ws.map(function(w){return '<div class="gs-shim" style="width:'+w+'"></div>';}).join('');
}

/* ── AI STREAM ── */
function streamStory(season, opp, ts, os, result, date, venue, week) {
  var storyEl = document.getElementById('gs-story');
  var dotEl   = document.getElementById('gs-dot');
  var raw = '';

  var prompt =
    'Write a full Tower Report game story for this Texas Longhorns game.\n\n'
    +'Texas '+ts+' '+(result==='W'?'defeated':'lost to')+' '+opp+' '+os+'\n'
    +'Date: '+date+(season?', '+season:'')+'\n'
    +'Venue: '+venue+'\n'
    +(week?'Week: '+week+'\n':'')
    +'\nUse web_search to find real stats, key player performances, and defining moments from this exact game.\n\n'
    +'Write a full Tower Report game story with:\n\n'
    +'**[Dramatic Headline]**\n\n'
    +'[Opening paragraph: the single most memorable play or moment]\n\n'
    +'[3–4 paragraphs covering game flow, key stats, player performances, turning points, and what it meant for the program]\n\n'
    +'**KEY MOMENTS**\n• [Play 1]\n• [Play 2]\n• [Play 3]\n\n'
    +'**TOWER TAKE:** [One sharp insider observation]\n\n'
    +'Voice: authoritative, specific, insider. Bold key player names and stats with **asterisks**. Write like you were there.';

  var searchingHTML = '<div class="gs-ai-searching"><span class="gs-search-dot"></span><div><div class="gs-search-txt">Getting your Tower Report…</div><div class="gs-search-sub">Grok AI is searching game archives for stats and key moments</div></div></div><div class="gs-shimmer">'+shims()+'</div>';
  storyEl.innerHTML = searchingHTML;
  var firstChunk = true;

  fetch('/api/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({messages:[{role:'user',content:prompt}]})
  })
  .then(function(res){
    if(!res.ok) throw new Error('API '+res.status);
    var reader = res.body.getReader();
    var dec = new TextDecoder();
    var buf = '';
    function pump(){
      return reader.read().then(function(ref){
        if(ref.done){
          var ytQ = encodeURIComponent('Texas Longhorns vs '+opp+' '+(season||'')+' '+(date||'')+' highlights');
          storyEl.innerHTML = mdHTML(raw)
            + ytHTML('https://www.youtube.com/results?search_query='+ytQ)
            + '<div class="gs-tags"><span class="gs-tag">Texas Longhorns</span><span class="gs-tag">'+season+'</span><span class="gs-tag">Grok AI</span><span class="gs-tag">Game Story</span></div>';
          if(dotEl) dotEl.classList.add('done');
          return;
        }
        buf += dec.decode(ref.value,{stream:true});
        var lines = buf.split('\n');
        buf = lines.pop();
        for(var i=0;i<lines.length;i++){
          var ln = lines[i];
          if(!ln.startsWith('data: ')) continue;
          var d = ln.slice(6).trim();
          if(d==='[DONE]') continue;
          try{
            var ev = JSON.parse(d);
            var delta = ev&&ev.choices&&ev.choices[0]&&ev.choices[0].delta&&ev.choices[0].delta.content;
            if(delta){
              raw+=delta;
              if(firstChunk){ firstChunk=false; }
              storyEl.innerHTML=mdHTML(raw)+'<span class="gs-cursor"></span>';
            }
          }catch(e){}
        }
        return pump();
      });
    }
    return pump();
  })
  .catch(function(err){
    storyEl.innerHTML='<p style="color:var(--muted);">Could not generate story. <a href="'+window.location.href+'" style="color:var(--orange);">Retry →</a></p>';
  });
}

/* ── MARKDOWN → HTML ── */
function mdHTML(txt){
  var lines=txt.split('\n'), out=[], inList=false, para=[];
  function flushP(){
    if(para.length){var t=para.join(' ').trim();if(t)out.push('<p>'+fmt(t)+'</p>');para=[];}
  }
  for(var i=0;i<lines.length;i++){
    var ln=lines[i];
    if(/^###?\s/.test(ln)){flushP();if(inList){out.push('</ul>');inList=false;}out.push('<h3>'+fmt(ln.replace(/^###?\s/,''))+'</h3>');continue;}
    if(/^##?\s/.test(ln)&&!ln.startsWith('###')){flushP();if(inList){out.push('</ul>');inList=false;}out.push('<h3>'+fmt(ln.replace(/^##?\s/,''))+'</h3>');continue;}
    if(/^#\s/.test(ln)){flushP();if(inList){out.push('</ul>');inList=false;}out.push('<h2>'+fmt(ln.replace(/^#\s/,''))+'</h2>');continue;}
    if(/^[•\-\*]\s/.test(ln)){flushP();if(!inList){out.push('<ul>');inList=true;}out.push('<li>'+fmt(ln.replace(/^[•\-\*]\s/,''))+'</li>');continue;}
    if(!ln.trim()){flushP();if(inList){out.push('</ul>');inList=false;}continue;}
    para.push(ln);
  }
  flushP();if(inList)out.push('</ul>');
  return out.join('');
}
function fmt(t){
  // strip citation refs like [[1]](url) or [1](url) that Grok adds
  t = t.replace(/\[\[?\d+\]?\]\([^)]*\)/g,'');
  // strip inline markdown links [text](url) → text
  t = t.replace(/\[([^\]]*)\]\([^)]*\)/g,'$1');
  return t
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+?)\*/g,'<em>$1</em>');
}
